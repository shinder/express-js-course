<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CORS 跨來源請求測試</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container py-4" style="max-width: 720px;">
      <h1 class="fs-3">CORS 跨來源請求測試</h1>
      <p class="text-muted">
        本頁來源為 <code>http://localhost:3200</code>，下方請求送往
        <code>http://localhost:3100</code>（不同埠 = 跨來源）。
      </p>

      <div class="d-flex gap-2 flex-wrap my-3">
        <button class="btn btn-primary" id="btn-get">簡單請求 GET /api/data</button>
        <button class="btn btn-warning" id="btn-put">預檢請求 PUT /api/users/1</button>
      </div>

      <h5>結果：</h5>
      <pre id="output" class="bg-light p-3 border rounded">尚未發送請求</pre>
    </div>

    <script>
      const API = 'http://localhost:3100';
      const output = document.querySelector('#output');
      const show = (label, data) =>
        (output.textContent = label + '\n' + JSON.stringify(data, null, 2));
      const showErr = (label, err) =>
        (output.textContent = label + '（被 CORS 或網路阻擋）\n' + err);

      // 簡單請求（GET，不會觸發預檢）
      document.querySelector('#btn-get').addEventListener('click', async () => {
        try {
          const r = await fetch(`${API}/api/data`, { credentials: 'include' });
          const total = r.headers.get('X-Total-Count'); // 需後端 exposedHeaders 才讀得到
          show('GET 成功，X-Total-Count=' + total, await r.json());
        } catch (err) {
          showErr('GET 失敗', err);
        }
      });

      // 預檢請求（PUT + application/json 會先發 OPTIONS）
      document.querySelector('#btn-put').addEventListener('click', async () => {
        try {
          const r = await fetch(`${API}/api/users/1`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ name: 'John Doe' }),
          });
          show('PUT 成功', await r.json());
        } catch (err) {
          showErr('PUT 失敗', err);
        }
      });
    </script>
  </body>
</html>
